name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e cli/ -e server/

      - name: Smoke import
        run: |
          python -c "from forge_cli.main import app; from forge_server.main import app as api"
          forge --help

      - name: Compile Python sources
        run: python -m compileall cli/forge_cli server/forge_server
